openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CampusPulse core API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profiles
    description: Student profiles operations
  - name: posts
    description: Verified identity campus feed
  - name: communities
    description: Clubs and communities
  - name: anonymous
    description: Anonymous confessions and discussion feeds
  - name: events
    description: Event planning and discovery
  - name: chat
    description: Blind matchmaking and chat
  - name: moderation
    description: Moderation, reports, and shadow ban controls
  - name: notifications
    description: Push and in-app notifications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Initiate college email registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Verification Magic Link email dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"

  /auth/verify:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email magic link token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Verification successful, session active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh JWT access tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Fetch current student profile
      responses:
        "200":
          description: Student profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profiles]
      summary: Edit current student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profiles/{id}:
    get:
      operationId: getProfileById
      tags: [profiles]
      summary: Fetch another student's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /communities:
    get:
      operationId: listCommunities
      tags: [communities]
      summary: List campus communities
      responses:
        "200":
          description: Array of communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"
    post:
      operationId: createCommunity
      tags: [communities]
      summary: Build a new campus club/community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityRequest"
      responses:
        "201":
          description: Community created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"

  /communities/{id}/join:
    post:
      operationId: joinCommunity
      tags: [communities]
      summary: Join or leave a campus community
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Membership updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  joined:
                    type: boolean
                required: [joined]

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: Query campus verified posts feed
      parameters:
        - name: communityId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Array of feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create post on verified campus feed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete verified post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post deleted successfully

  /posts/{id}/like:
    post:
      operationId: toggleLikePost
      tags: [posts]
      summary: Like or unlike a verified post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: boolean
                required: [liked]

  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [posts]
      summary: Query comments for a verified post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [posts]
      summary: Comment on a verified post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /anon/posts:
    get:
      operationId: listAnonymousPosts
      tags: [anonymous]
      summary: Fetch anonymous confessions and discussions
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Array of anonymous posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnonymousPost"
    post:
      operationId: createAnonymousPost
      tags: [anonymous]
      summary: Post a confession anonymously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnonymousPostRequest"
      responses:
        "201":
          description: Anonymous confession posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousPost"

  /anon/posts/{id}:
    delete:
      operationId: deleteAnonymousPost
      tags: [anonymous]
      summary: Delete an anonymous confession (requires matching crypt signature hash)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post deleted successfully

  /anon/posts/{id}/vote:
    post:
      operationId: voteAnonymousPost
      tags: [anonymous]
      summary: Upvote or downvote anonymous confession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnonymousVoteRequest"
      responses:
        "200":
          description: Vote applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  upvoteCount:
                    type: integer
                  downvoteCount:
                    type: integer
                  userVote:
                    type: integer
                required: [upvoteCount, downvoteCount, userVote]

  /anon/posts/{id}/comments:
    get:
      operationId: listAnonymousComments
      tags: [anonymous]
      summary: Query comments for an anonymous confession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of anonymous comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnonymousComment"
    post:
      operationId: createAnonymousComment
      tags: [anonymous]
      summary: Comment anonymously on a confession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnonymousCommentRequest"
      responses:
        "201":
          description: Anonymous comment posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousComment"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: Query scheduled campus events
      parameters:
        - name: communityId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Plan and list a new campus event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: RSVP to a campus event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpRequest"
      responses:
        "200":
          description: RSVP recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /reports:
    post:
      operationId: createReport
      tags: [moderation]
      summary: Flag a post, comment, or chat room for rule violations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Report recorded and queued for moderation review

  /moderation/shadow-ban:
    post:
      operationId: applyShadowBan
      tags: [moderation]
      summary: Shadowban a user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShadowBanRequest"
      responses:
        "200":
          description: User shadow-banned successfully

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get in-app notification alerts
      responses:
        "200":
          description: Array of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification alert as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification status marked read

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [accessToken, refreshToken, user]

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        major:
          type: string
        graduationYear:
          type: integer
        profilePicture:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        campusDomain:
          type: string
      required: [id, email, fullName, major, graduationYear, campusDomain]

    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        major:
          type: string
        graduationYear:
          type: integer
        profilePicture:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true

    Community:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        campusDomain:
          type: string
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, slug, campusDomain, createdAt]

    CreateCommunityRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
      required: [name, slug]

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        profilePicture:
          type: string
          nullable: true
        content:
          type: string
        imageUrl:
          type: string
          nullable: true
        communityId:
          type: string
          format: uuid
          nullable: true
        campusDomain:
          type: string
        createdAt:
          type: string
          format: date-time
        commentCount:
          type: integer
        likeCount:
          type: integer
        isLiked:
          type: boolean
      required: [id, userId, fullName, content, campusDomain, createdAt, commentCount, likeCount, isLiked]

    CreatePostRequest:
      type: object
      properties:
        content:
          type: string
        imageUrl:
          type: string
        communityId:
          type: string
          format: uuid
      required: [content]

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        postId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        profilePicture:
          type: string
          nullable: true
        content:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, postId, userId, fullName, content, createdAt]

    CreateCommentRequest:
      type: object
      properties:
        content:
          type: string
        parentId:
          type: string
          format: uuid
      required: [content]

    AnonymousPost:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        aliasName:
          type: string
        aliasAvatar:
          type: string
        campusDomain:
          type: string
        upvoteCount:
          type: integer
        downvoteCount:
          type: integer
        commentCount:
          type: integer
        userVote:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, content, aliasName, aliasAvatar, campusDomain, upvoteCount, downvoteCount, commentCount, createdAt]

    CreateAnonymousPostRequest:
      type: object
      properties:
        content:
          type: string
      required: [content]

    AnonymousComment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        postId:
          type: string
          format: uuid
        content:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        aliasName:
          type: string
        aliasAvatar:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, postId, content, aliasName, aliasAvatar, createdAt]

    CreateAnonymousCommentRequest:
      type: object
      properties:
        content:
          type: string
        parentId:
          type: string
          format: uuid
      required: [content]

    AnonymousVoteRequest:
      type: object
      properties:
        value:
          type: integer
          enum: [1, -1]
      required: [value]

    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        location:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        imageUrl:
          type: string
          nullable: true
        communityId:
          type: string
          format: uuid
          nullable: true
        createdBy:
          type: string
          format: uuid
        campusDomain:
          type: string
        createdAt:
          type: string
          format: date-time
        rsvpStatus:
          type: string
          nullable: true
        rsvpCount:
          type: integer
      required: [id, title, description, location, startsAt, endsAt, createdBy, campusDomain, createdAt, rsvpCount]

    CreateEventRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        imageUrl:
          type: string
        communityId:
          type: string
          format: uuid
      required: [title, description, location, startsAt, endsAt]

    RsvpRequest:
      type: object
      properties:
        status:
          type: string
          enum: [attending, maybe, declined]
      required: [status]

    ReportRequest:
      type: object
      properties:
        entityId:
          type: string
          format: uuid
        entityType:
          type: string
          enum: [post, comment, anon_post, anon_comment, chat]
        reason:
          type: string
        details:
          type: string
      required: [entityId, entityType, reason]

    ShadowBanRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        reason:
          type: string
        durationDays:
          type: integer
      required: [userId, reason]

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
        type:
          type: string
        entityId:
          type: string
          format: uuid
          nullable: true
        entityType:
          type: string
          nullable: true
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, title, body, type, createdAt]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    VerifyEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        token:
          type: string
      required: [email, token]

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    RefreshTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]
